
apiVersion: v1
kind: Service
metadata:
  name: catalogue
  namespace: roboshop
  labels:
    project: catalogue
    tier: backend
    component: catalogue
spec:
  selector:
    # labels are used as selectors
    project: catalogue
    tier: backend
    component: catalogue
  ports:
  - protocol: TCP
    port: 8080 # servie port
    targetPort: 8080 # container port