
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  namespace: roboshop
  # these labels are replicaset labels
  labels:
    project: catalogue
    tier: backend
    component: catalogue
spec:
  replicas: {{ .Values.deployment.replicas }}
  selector:
    # using these labels replica set selects the pod
    matchLabels:
      project: catalogue
      tier: backend
      component: catalogue
  # This is pod definition, pod is subset of replicaset
  template:
    metadata:
      labels:
        project: catalogue
        tier: backend
        component: catalogue
    spec:
      containers:
      - name: catalogue
        image: "{{ .Values.deployment.imageName }}:{{ .Values.deployment.imageVersion }}"
        imagePullPolicy: Always
        # Readiness: Don't send traffic until the port is open
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "150m"
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 5
    # Liveness: Restart if the port becomes unresponsive
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          periodSeconds: 20
          failureThreshold: 5
        envFrom:
        - configMapRef:
            name: catalogue


